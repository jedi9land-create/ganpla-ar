<!DOCTYPE html> 

<html> 

<head> 

  <meta charset="utf-8"> 

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script> 

  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script> 

</head> 

 

<body style="margin:0; overflow:hidden; font-family:sans-serif;"> 

 

<button onclick="nextStep()"  

style="position:absolute; top:20px; left:20px; z-index:999; padding:10px;"> 

次のパーツ 

</button> 

 

<button onclick="resetModel()"  

style="position:absolute; top:20px; left:140px; z-index:999; padding:10px;"> 

リセット 

</button> 

 

<div id="labelUI" 

     style="position:absolute; 

            top:70px; 

            left:20px; 

            z-index:999; 

            color:white; 

            font-size:20px; 

            background:black; 

            padding:10px;"> 

組み立てスタート 

</div> 

 

<a-scene embedded arjs> 

  <a-marker preset="hiro"> 

 

    <!-- 胴体 --> 

    <a-box id="body" 

           position="0 3 0" 

           depth="0.4" 

           height="0.8" 

           width="0.6" 

           color="blue" 

           visible="false"> 

    </a-box> 

 

    <!-- 腰 --> 

    <a-box id="waist" 

           position="0 3 0" 

           depth="0.4" 

           height="0.3" 

           width="0.7" 

           color="red" 

           visible="false"> 

    </a-box> 

 

    <!-- 頭 --> 

    <a-box id="head" 

           position="0 3 0" 

           depth="0.4" 

           height="0.4" 

           width="0.4" 

           color="white" 

           visible="false"> 

    </a-box> 

 

  </a-marker> 

 

  <a-entity camera></a-entity> 

</a-scene> 

 

<script> 

let step = 0; 

 

function animatePart(id, finalY) { 

  const part = document.querySelector(id); 

  part.setAttribute("visible", true); 

  part.setAttribute("animation", 

    "property: position; to: 0 " + finalY + " 0; dur: 1000; easing: easeOutQuad;"); 

} 

 

function nextStep() { 

  step++; 

 

  if (step === 1) { 

    animatePart("#body", 1); 

    document.querySelector("#labelUI").innerText = "Step1: 胴体を取り付け"; 

  } 

 

  else if (step === 2) { 

    animatePart("#waist", 0.6); 

    document.querySelector("#labelUI").innerText = "Step2: 腰パーツを取り付け"; 

  } 

 

  else if (step === 3) { 

    animatePart("#head", 1.6); 

    document.querySelector("#labelUI").innerText = "Step3: 頭部を取り付け"; 

  } 

 

  else { 

    document.querySelector("#labelUI").innerText = "完成！"; 

  } 

} 

 

function resetModel() { 

  step = 0; 

 

  const parts = ["#body", "#waist", "#head"]; 

 

  parts.forEach(id => { 

    const part = document.querySelector(id); 

    part.setAttribute("visible", false); 

    part.removeAttribute("animation"); 

    part.setAttribute("position", "0 3 0"); 

  }); 

 

  document.querySelector("#labelUI").innerText = "組み立てスタート"; 

} 

</script> 

 

</body> 

</html>
