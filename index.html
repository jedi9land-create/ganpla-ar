<!DOCTYPE html> 

<html> 

<head> 

  <meta charset="utf-8"> 

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script> 

  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script> 

</head> 

 

<body style="margin:0; overflow:hidden; font-family:sans-serif;"> 

 

<button onclick="nextStep()"  

style="position:absolute; top:20px; left:20px; z-index:999; padding:10px;"> 

次のパーツ 

</button> 

 

<button onclick="resetModel()"  

style="position:absolute; top:60px; left:20px; z-index:999; padding:10px;"> 

リセット 

</button> 

 

<div id="labelUI" 

     style="position:absolute; 

            top:110px; 

            left:20px; 

            z-index:999; 

            color:white; 

            font-size:18px; 

            background:black; 

            padding:10px;"> 

組み立てスタート 

</div> 

 

<a-scene embedded arjs> 

  <a-marker preset="hiro"> 

 

    <!-- 胴体 --> 

    <a-box id="body" position="0 3 0" 

           depth="0.4" height="0.8" width="0.6" 

           color="blue" visible="false"></a-box> 

 

    <!-- 腰 --> 

    <a-box id="waist" position="0 3 0" 

           depth="0.4" height="0.3" width="0.7" 

           color="red" visible="false"></a-box> 

 

    <!-- 頭 --> 

    <a-box id="head" position="0 3 0" 

           depth="0.4" height="0.4" width="0.4" 

           color="white" visible="false"></a-box> 

 

    <!-- 左腕 --> 

    <a-box id="leftArm" position="0 3 0" 

           depth="0.3" height="0.7" width="0.3" 

           color="white" visible="false"></a-box> 

 

    <!-- 右腕 --> 

    <a-box id="rightArm" position="0 3 0" 

           depth="0.3" height="0.7" width="0.3" 

           color="white" visible="false"></a-box> 

 

    <!-- 左脚 --> 

    <a-box id="leftLeg" position="0 3 0" 

           depth="0.3" height="1" width="0.3" 

           color="gray" visible="false"></a-box> 

 

    <!-- 右脚 --> 

    <a-box id="rightLeg" position="0 3 0" 

           depth="0.3" height="1" width="0.3" 

           color="gray" visible="false"></a-box> 

 

  </a-marker> 

 

  <a-entity camera></a-entity> 

</a-scene> 

 

<script> 

let step = 0; 

 

function animatePart(id, x, y) { 

  const part = document.querySelector(id); 

  part.setAttribute("visible", true); 

  part.setAttribute("animation", 

    "property: position; to: " + x + " " + y + " 0; dur: 800; easing: easeOutQuad;"); 

} 

 

function nextStep() { 

  step++; 

 

  if (step === 1) { 

    animatePart("#body", 0, 1); 

    label("Step1: 胴体"); 

  } 

  else if (step === 2) { 

    animatePart("#waist", 0, 0.6); 

    label("Step2: 腰"); 

  } 

  else if (step === 3) { 

    animatePart("#head", 0, 1.6); 

    label("Step3: 頭部"); 

  } 

  else if (step === 4) { 

    animatePart("#leftArm", -0.6, 1.1); 

    label("Step4: 左腕"); 

  } 

  else if (step === 5) { 

    animatePart("#rightArm", 0.6, 1.1); 

    label("Step5: 右腕"); 

  } 

  else if (step === 6) { 

    animatePart("#leftLeg", -0.2, 0); 

    label("Step6: 左脚"); 

  } 

  else if (step === 7) { 

    animatePart("#rightLeg", 0.2, 0); 

    label("Step7: 右脚"); 

  } 

  else { 

    label("完成！"); 

  } 

} 

 

function label(text) { 

  document.querySelector("#labelUI").innerText = text; 

} 

 

function resetModel() { 

  step = 0; 

 

  const parts = ["#body","#waist","#head","#leftArm","#rightArm","#leftLeg","#rightLeg"]; 

 

  parts.forEach(id => { 

    const part = document.querySelector(id); 

    part.setAttribute("visible", false); 

    part.removeAttribute("animation"); 

    part.setAttribute("position", "0 3 0"); 

  }); 

 

  label("組み立てスタート"); 

} 

</script> 

 

</body> 

</html>
