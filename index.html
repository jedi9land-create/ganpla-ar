<!DOCTYPE html> 

<html> 

<head> 

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script> 

  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script> 

</head> 

 

<body style="margin: 0; overflow: hidden;"> 

  <a-scene embedded arjs> 

    <a-marker preset="hiro"> 

 

      <!-- 頭 --> 

      <a-box position="0 1.6 0" depth="0.4" height="0.4" width="0.4" color="white"></a-box> 

 

      <!-- 体 --> 

      <a-box position="0 1 0" depth="0.4" height="0.8" width="0.6" color="blue"></a-box> 

 

      <!-- 左ツノ --> 

      <a-box position="-0.15 1.9 0" depth="0.05" height="0.5" width="0.05" 

             rotation="0 0 20" 

             color="yellow"></a-box> 

 

      <!-- 右ツノ --> 

      <a-box position="0.15 1.9 0" depth="0.05" height="0.5" width="0.05" 

             rotation="0 0 -20" 

             color="yellow"></a-box> 

 

    </a-marker> 

    <a-entity camera></a-entity> 

  </a-scene> 

</body> 

</html>
