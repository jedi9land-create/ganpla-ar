<!DOCTYPE html> 

<html> 

<head> 

  <meta charset="utf-8"> 

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script> 

  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script> 

</head> 

 

<body style="margin:0; overflow:hidden; font-family:sans-serif;"> 

 

<!-- ボタン --> 

<button onclick="nextStep()"  

style="position:absolute; top:20px; left:20px; z-index:999; padding:10px;"> 

次のパーツ 

</button> 

 

<!-- ラベルUI（確実に表示される） --> 

<div id="labelUI" 

     style="position:absolute; 

            top:70px; 

            left:20px; 

            z-index:999; 

            color:white; 

            font-size:20px; 

            background:black; 

            padding:10px;"> 

組み立てスタート 

</div> 

 

<a-scene embedded arjs> 

  <a-marker preset="hiro"> 

 

    <!-- 胴体 --> 

    <a-box id="body" 

           position="0 1 0" 

           depth="0.4" 

           height="0.8" 

           width="0.6" 

           color="blue" 

           visible="false"> 

    </a-box> 

 

    <!-- 腰 --> 

    <a-box id="waist" 

           position="0 0.6 0" 

           depth="0.4" 

           height="0.3" 

           width="0.7" 

           color="red" 

           visible="false"> 

    </a-box> 

 

    <!-- 頭 --> 

    <a-box id="head" 

           position="0 1.6 0" 

           depth="0.4" 

           height="0.4" 

           width="0.4" 

           color="white" 

           visible="false"> 

    </a-box> 

 

  </a-marker> 

 

  <a-entity camera></a-entity> 

</a-scene> 

 

<script> 

let step = 0; 

 

function nextStep() { 

  step++; 

 

  if (step === 1) { 

    document.querySelector("#body").setAttribute("visible", true); 

    document.querySelector("#labelUI").innerText = "Step1: 胴体を取り付け"; 

  } 

 

  else if (step === 2) { 

    document.querySelector("#waist").setAttribute("visible", true); 

    document.querySelector("#labelUI").innerText = "Step2: 腰パーツを取り付け"; 

  } 

 

  else if (step === 3) { 

    document.querySelector("#head").setAttribute("visible", true); 

    document.querySelector("#labelUI").innerText = "Step3: 頭部を取り付け"; 

  } 

 

  else { 

    document.querySelector("#labelUI").innerText = "完成！"; 

  } 

} 

</script> 

 

</body> 

</html>
