<!DOCTYPE html> 

<html> 

<head> 

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script> 

  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script> 

</head> 

 

<body style="margin: 0; overflow: hidden;"> 

 

<button onclick="nextStep()"  

style="position:absolute; top:20px; left:20px; z-index:999; padding:10px;"> 

次のパーツ 

</button> 

 

<a-scene embedded arjs> 

  <a-marker preset="hiro"> 

 

    <!-- パーツ --> 

    <a-box id="body" position="0 1 0" 

           depth="0.4" height="0.8" width="0.6" 

           color="blue" visible="false"></a-box> 

 

    <a-box id="waist" position="0 0.6 0" 

           depth="0.4" height="0.3" width="0.7" 

           color="red" visible="false"></a-box> 

 

    <a-box id="head" position="0 1.6 0" 

           depth="0.4" height="0.4" width="0.4" 

           color="white" visible="false"></a-box> 

 

    <!-- ラベル --> 

   <a-text id="label" 

        value="" 

        position="0 2 0" 

        rotation="-90 0 0" 

        align="center" 

        color="yellow" 

        scale="4 4 4"> 

</a-text> 

  </a-marker> 

 

  <a-entity camera></a-entity> 

</a-scene> 

 

<script> 

let step = 0; 

 

function nextStep() { 

  step++; 

 

  if (step === 1) { 

    document.querySelector("#body").setAttribute("visible", true); 

    document.querySelector("#label").setAttribute("value", "Step1: 胴体"); 

  } 

 

  if (step === 2) { 

    document.querySelector("#waist").setAttribute("visible", true); 

    document.querySelector("#label").setAttribute("value", "Step2: 腰"); 

  } 

 

  if (step === 3) { 

    document.querySelector("#head").setAttribute("visible", true); 

    document.querySelector("#label").setAttribute("value", "Step3: 頭部"); 

  } 

} 

</script> 

 

</body> 

</html>
