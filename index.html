<!DOCTYPE html> 

<html> 

<head> 

<meta charset="utf-8"> 

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script> 

<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script> 

</head> 

 

<body style="margin:0; overflow:hidden; font-family:sans-serif;"> 

 

<button onclick="nextStep()"  

style="position:absolute; top:20px; left:20px; z-index:999; padding:10px;"> 

次のパーツ 

</button> 

 

<button onclick="resetModel()"  

style="position:absolute; top:60px; left:20px; z-index:999; padding:10px;"> 

リセット 

</button> 

 

<div id="labelUI" 

style="position:absolute; top:110px; left:20px; z-index:999; 

color:white; font-size:18px; background:black; padding:10px;"> 

組み立てスタート 

</div> 

 

<a-scene embedded arjs> 

<a-marker preset="hiro"> 

 

<a-entity id="gundam"> 

 

<!-- 胴体 --> 

<a-box id="body" position="0 3 0" 

depth="0.4" height="0.8" width="0.6" 

color="blue" visible="false"></a-box> 

 

<!-- 腰 --> 

<a-box id="waist" position="0 3 0" 

depth="0.4" height="0.3" width="0.7" 

color="red" visible="false"></a-box> 

 

<!-- 頭 --> 

<a-box id="head" position="0 3 0" 

depth="0.4" height="0.4" width="0.4" 

color="white" visible="false"></a-box> 

 

<!-- 目 --> 

<a-box id="eye" position="0 1.6 0.21" 

depth="0.05" height="0.1" width="0.3" 

color="black" visible="false"></a-box> 

 

<!-- ツノ --> 

<a-box id="hornL" position="-0.15 3 0" 

depth="0.05" height="0.4" width="0.05" 

rotation="0 0 20" 

color="yellow" visible="false"></a-box> 

 

<a-box id="hornR" position="0.15 3 0" 

depth="0.05" height="0.4" width="0.05" 

rotation="0 0 -20" 

color="yellow" visible="false"></a-box> 

 

<!-- 腕 --> 

<a-box id="leftArm" position="0 3 0" 

depth="0.3" height="0.7" width="0.3" 

color="white" visible="false"></a-box> 

 

<a-box id="rightArm" position="0 3 0" 

depth="0.3" height="0.7" width="0.3" 

color="white" visible="false"></a-box> 

 

<!-- 脚 --> 

<a-box id="leftLeg" position="0 3 0" 

depth="0.3" height="1" width="0.3" 

color="gray" visible="false"></a-box> 

 

<a-box id="rightLeg" position="0 3 0" 

depth="0.3" height="1" width="0.3" 

color="gray" visible="false"></a-box> 

 

<!-- ライフル --> 

<a-box id="rifle" position="0 3 0" 

depth="0.2" height="0.2" width="0.8" 

color="black" visible="false"></a-box> 

 

<!-- シールド --> 

<a-box id="shield" position="0 3 0" 

depth="0.1" height="0.8" width="0.6" 

color="red" visible="false"></a-box> 

 

</a-entity> 

 

</a-marker> 

<a-entity camera></a-entity> 

</a-scene> 

 

<script> 

let step = 0; 

 

function animatePart(id, x, y) { 

const part = document.querySelector(id); 

part.setAttribute("visible", true); 

part.setAttribute("animation", 

"property: position; to: " + x + " " + y + " 0; dur: 800; easing: easeOutQuad;"); 

} 

 

function nextStep(){ 

step++; 

 

if(step===1){animatePart("#body",0,1);label("胴体");} 

else if(step===2){animatePart("#waist",0,0.6);label("腰");} 

else if(step===3){animatePart("#head",0,1.6);label("頭部");} 

else if(step===4){animatePart("#hornL",-0.15,1.9);animatePart("#hornR",0.15,1.9);label("Vアンテナ");} 

else if(step===5){animatePart("#eye",0,1.6);document.querySelector("#eye").setAttribute("color","lime");label("目点灯");} 

else if(step===6){animatePart("#leftArm",-0.6,1.1);animatePart("#rightArm",0.6,1.1);label("腕");} 

else if(step===7){animatePart("#leftLeg",-0.2,0);animatePart("#rightLeg",0.2,0);label("脚");} 

else if(step===8){animatePart("#rifle",0.9,1.1);animatePart("#shield",-1,1.1);label("武装装備");} 

else if(step===9){ 

label("完成！"); 

document.querySelector("#gundam") 

.setAttribute("animation","property: rotation; to: 0 360 0; loop:true; dur:6000;"); 

} 

} 

 

function label(t){document.querySelector("#labelUI").innerText=t;} 

 

function resetModel(){ 

step=0; 

const parts=["#body","#waist","#head","#eye","#hornL","#hornR", 

"#leftArm","#rightArm","#leftLeg","#rightLeg","#rifle","#shield"]; 

parts.forEach(id=>{ 

const p=document.querySelector(id); 

p.setAttribute("visible",false); 

p.removeAttribute("animation"); 

p.setAttribute("position","0 3 0"); 

}); 

document.querySelector("#gundam").removeAttribute("animation"); 

label("組み立てスタート"); 

} 

</script> 

 

</body> 

</html>
